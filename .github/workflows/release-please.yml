name: Release Please

# PR-based release flow.
#
# How it works:
#   1. On every push to main, release-please reads the conventional-commit
#      history and opens/updates a "chore(main): release X.Y.Z" PR that bumps
#      Version.xcconfig + version.txt and writes CHANGELOG.md.
#   2. You review that PR. Merging it IS the release approval (this is the
#      human gate).
#   3. On merge, release-please creates the git tag + a published GitHub
#      Release with the changelog notes.
#   4. This workflow then calls release.yml (as a reusable workflow) to build,
#      sign, and notarize the app and attach the .dmg/.zip to that release.
#
# Note: the release + tag are created with GITHUB_TOKEN, which deliberately
# does NOT trigger other workflows (GitHub blocks that to avoid recursion).
# That's why the build runs via the reusable call below instead of a tag
# trigger — no personal access token required.

on:
  push:
    branches: [main]

permissions:
  contents: write        # create the release + tag, and upload assets
  pull-requests: write   # open/update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@v5
        # Config + last-released version live in release-please-config.json and
        # .release-please-manifest.json (the action's default filenames).

  # Build the app and attach it to the release release-please just made.
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      attach_to_tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
